<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play — Spiritual Vibes</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; background: #000; }
    body.play { display: block; }
    #game { width: 100vw; height: 100vh; }
    .back-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 10;
      color: #fdf8f1;
      background: rgba(0,0,0,0.45);
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      text-decoration: none;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.95rem;
    }
    .back-link:hover { background: rgba(0,0,0,0.7); }

    .touch-controls { display: none; }
    body.touch .touch-controls {
      display: block;
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body.touch .touch-controls .cluster {
      position: absolute;
      bottom: 4vh;
      display: flex;
      gap: 2vh;
      pointer-events: auto;
    }
    body.touch .touch-controls .cluster.left { left: 4vh; }
    body.touch .touch-controls .cluster.right { right: 4vh; }
    body.touch .touch-controls button {
      width: min(14vh, 14vw);
      height: min(14vh, 14vw);
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.18);
      color: #fdf8f1;
      font: 700 min(5vh, 5vw)/1 Georgia, "Times New Roman", serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    body.touch .touch-controls button:active,
    body.touch .touch-controls button.pressed {
      background: rgba(255,255,255,0.36);
      border-color: rgba(255,255,255,0.9);
    }
  </style>
</head>
<body class="play">
  <a class="back-link" href="index.html">← Home</a>
  <div id="game"></div>
  <div class="touch-controls" aria-hidden="true">
    <div class="cluster left">
      <button type="button" data-action="left" aria-label="Move left">◀</button>
      <button type="button" data-action="right" aria-label="Move right">▶</button>
    </div>
    <div class="cluster right">
      <button type="button" data-action="jump" aria-label="Jump">▲</button>
      <button type="button" data-action="shoot" aria-label="Shoot">◉</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
  <script>
    const touchInput = {
      left: false,
      right: false,
      shoot: false,
      jumpPressed: false,
      enterPressed: false
    };

    (function initTouchControls() {
      const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints || 0) > 0;
      if (!isTouch) return;
      document.body.classList.add('touch');

      const overlay = document.querySelector('.touch-controls');
      if (!overlay) return;

      const setHeld = (key, val) => { touchInput[key] = val; };
      const setOneShot = (key) => { touchInput[key] = true; };

      const bind = (action, onDown, onUp) => {
        const el = overlay.querySelector('[data-action="' + action + '"]');
        if (!el) return;
        const down = (e) => {
          e.preventDefault();
          el.classList.add('pressed');
          if (el.setPointerCapture && e.pointerId != null) {
            try { el.setPointerCapture(e.pointerId); } catch (_) {}
          }
          onDown();
          // Tapping anywhere also doubles as "restart" on the game-over screen,
          // since touch devices have no Enter key.
          touchInput.enterPressed = true;
        };
        const up = (e) => {
          e.preventDefault();
          el.classList.remove('pressed');
          if (onUp) onUp();
        };
        el.addEventListener('pointerdown', down);
        el.addEventListener('pointerup', up);
        el.addEventListener('pointercancel', up);
        el.addEventListener('pointerleave', up);
        el.addEventListener('contextmenu', (e) => e.preventDefault());
      };

      bind('left', () => setHeld('left', true), () => setHeld('left', false));
      bind('right', () => setHeld('right', true), () => setHeld('right', false));
      bind('shoot', () => setHeld('shoot', true), () => setHeld('shoot', false));
      bind('jump', () => setOneShot('jumpPressed'), null);

      const resetAll = () => {
        touchInput.left = false;
        touchInput.right = false;
        touchInput.shoot = false;
        touchInput.jumpPressed = false;
        overlay.querySelectorAll('button.pressed').forEach((b) => b.classList.remove('pressed'));
      };
      document.addEventListener('visibilitychange', () => { if (document.hidden) resetAll(); });
      window.addEventListener('blur', resetAll);
    })();
  </script>
  <script>
    const CFG = {
      BASE_W: 1280,
      BASE_H: 720,
      WORLD_W: 4000,
      GROUND_H: 60,
      GRAVITY: 1900,
      PLAYER_SPEED: 230,
      JUMP_V: -1000,
      FIRE_RATE_MS: 280,
      BOOSTED_FIRE_RATE_MS: 110,
      BULLET_SPEED: 700,
      ENEMY_SPEED: 95,
      PATROLLER_SPEED: 70,
      SHOOTER_FIRE_MS: 1500,
      SHOOTER_BULLET_SPEED: 250,
      ENEMY_SPAWN_MU: 3000,
      ENEMY_SPAWN_SIGMA: 2000,
      ENEMY_SPAWN_MIN: 300,
      ENEMY_SPAWN_MAX: 8000,
      HEALTH_MAX: 5,
      ENEMY_DAMAGE: 1,
      INVULN_MS: 900,
      POWERUP_DURATION_MS: 6000,
      SCORE_PER_KILL: 10,
      HEAL_AMOUNT: 2,
      PICKUP_LIFETIME_MS: 5000,
      PICKUP_BLINK_MS: 1000,
      HP: { runner: 3, patroller: 5, shooter: 4 },
      DROP_RATE: { runner: 0.50, patroller: 0.70, shooter: 0.80 },
      HEALTH_SHARE: { runner: 0.70, patroller: 0.50, shooter: 0.30 },
      KIND_WEIGHTS_GROUND: { runner: 0.60, shooter: 0.30, patroller: 0.10 },
      KIND_WEIGHTS_PLATFORM: { patroller: 0.60, shooter: 0.30, runner: 0.10 },
      ENEMY_RADIUS: 18,
      COLORS: {
        bg: 0x1a1410,
        player: 0xffffff,
        runner: 0xd84545,
        patroller: 0xe6a23c,
        shooter: 0x4a6fa5,
        bullet: 0xffe45c,
        enemyBullet: 0xff8c3a,
        health: 0x6cc55a,
        powerup: 0x4aa3ff,
        ground: 0x2e2a26,
        platform: 0x8b3a1f
      }
    };

    class MainScene extends Phaser.Scene {
      constructor() { super('MainScene'); }

      preload() {
        this.load.image('bg', 'assets/background.jpeg');
        this.load.image('texture', 'assets/texture.png');
        this.load.audio('soundtrack', 'assets/soundtrack.mp3');
        this.load.image('pope', 'assets/pope.png');
        this.load.image('enemy_drone', 'assets/enemy_drone.png');
        this.load.image('enemy_goblin', 'assets/enemy_goblin.png');
        this.load.image('enemy_transumanoid', 'assets/enemy_transumanoid.png');
      }

      create() {
        this.cameras.main.setBackgroundColor('#1a1410');
        this.buildBackground();
        this.buildTextures();
        this.setupMusic();

        const vh = this.scale.height;
        this.physics.world.setBounds(0, 0, CFG.WORLD_W, vh);
        this.physics.world.gravity.y = CFG.GRAVITY;

        this.gameOver = false;
        this.score = 0;
        this.health = CFG.HEALTH_MAX;
        this.facing = 1;
        this.lastFireAt = 0;
        this.currentFireRate = CFG.FIRE_RATE_MS;
        this.powerupUntil = 0;
        this.invulnUntil = 0;
        this.nextEnemyEvent = null;

        this.buildWorld(vh);
        this.spawnPlayer(vh);
        this.setupGroups();
        this.setupCollisions();
        this.setupInput();
        this.setupCamera(vh);
        this.scheduleNextEnemy();
        this.buildHud();
      }

      buildBackground() {
        const vh = this.scale.height;
        const tex = this.textures.get('bg').getSourceImage();
        const bg = this.add.tileSprite(0, 0, CFG.WORLD_W, vh, 'bg')
          .setOrigin(0, 0)
          .setDepth(-1000)
          .setScrollFactor(1, 1);
        const scale = vh / tex.height;
        bg.setTileScale(scale, scale);
      }

      setupMusic() {
        this.music = this.sound.add('soundtrack', { loop: true, volume: 0.5 });
        const start = () => {
          if (this.sound.locked) return;
          if (!this.music.isPlaying) this.music.play();
        };
        if (this.sound.locked) {
          this.sound.once(Phaser.Sound.Events.UNLOCKED, start);
        } else {
          start();
        }
        this.input.once('pointerdown', start);
        this.input.keyboard.once('keydown', start);
        this.events.once(Phaser.Scenes.Events.SHUTDOWN, () => {
          if (this.music) this.music.stop();
        });
      }

      buildTextures() {
        const mkCircle = (key, color, r) => {
          const g = this.add.graphics();
          g.fillStyle(color, 1);
          g.fillCircle(r, r, r);
          g.generateTexture(key, r * 2, r * 2);
          g.destroy();
        };
        // Enemy sprites are real images now (assigned in spawnEnemy); no circle textures needed.
        const mkCross = (key, color) => {
          const w = 18, h = 12, thick = 3;
          const g = this.add.graphics();
          g.fillStyle(color, 1);
          g.fillRect(0, (h - thick) / 2, w, thick);
          // Crosspiece near the right end => head of the crucifix on the right.
          g.fillRect(w - thick * 2, 0, thick, h);
          g.generateTexture(key, w, h);
          g.destroy();
        };
        mkCross('tex_bullet', CFG.COLORS.bullet);
        mkCross('tex_enemy_bullet', CFG.COLORS.enemyBullet);
        mkCircle('tex_health', CFG.COLORS.health, 12);
        mkCircle('tex_powerup', CFG.COLORS.powerup, 12);
      }

      addTexturedPlatform(x, y, w, h) {
        const tex = this.textures.get('texture').getSourceImage();
        const tileScale = (h < 40 ? h / tex.height : 64 / tex.height) * 5;
        const sprite = this.add.tileSprite(x, y, w, h, 'texture');
        sprite.setTileScale(tileScale, tileScale);
        this.physics.add.existing(sprite, true);
        this.platforms.add(sprite);
        return sprite;
      }

      buildWorld(vh) {
        this.platforms = this.physics.add.staticGroup();
        const groundY = vh - CFG.GROUND_H / 2;
        this.addTexturedPlatform(CFG.WORLD_W / 2, groundY, CFG.WORLD_W, CFG.GROUND_H);

        const platDefs = [
          { x: 500, y: vh - 180, w: 220 },
          { x: 900, y: vh - 280, w: 180 },
          { x: 1300, y: vh - 200, w: 200 },
          { x: 1700, y: vh - 320, w: 160 },
          { x: 2100, y: vh - 220, w: 240 },
          { x: 2600, y: vh - 300, w: 200 },
          { x: 3100, y: vh - 200, w: 220 },
          { x: 3500, y: vh - 280, w: 180 }
        ];

        this.surfaces = [{
          left: 0,
          right: CFG.WORLD_W,
          top: vh - CFG.GROUND_H,
          isGround: true
        }];

        for (const p of platDefs) {
          const plat = this.addTexturedPlatform(p.x, p.y, p.w, 20);
          this.surfaces.push({
            left: p.x - p.w / 2,
            right: p.x + p.w / 2,
            top: p.y - 10,
            isGround: false
          });
        }
      }

      spawnPlayer(vh) {
        this.player = this.physics.add.sprite(120, vh - 200, 'pope');
        this.player.setCollideWorldBounds(true);
        // pope.png is 339x423. Scale down by a fixed factor so display math is stable.
        const SCALE = 1 / 4;
        this.player.setScale(SCALE);
        // 20px-radius circle in display space => 60 in texture space (since 1/3 scale).
        const R = 60;
        this.player.body.setCircle(R, 339 / 2 - R, 423 - R * 2 - 20);
        this.physics.add.collider(this.player, this.platforms);
      }

      setupGroups() {
        this.bullets = this.physics.add.group();
        this.enemyBullets = this.physics.add.group({ allowGravity: false });
        this.enemies = this.physics.add.group();
        this.pickups = this.physics.add.group({ allowGravity: false });
      }

      setupCollisions() {
        this.physics.add.collider(this.enemies, this.platforms);

        this.physics.add.overlap(this.bullets, this.enemies, (bullet, enemy) => {
          bullet.destroy();
          if (!enemy.active) return;
          const hp = enemy.getData('hp') - 1;
          enemy.setData('hp', hp);
          if (hp <= 0) {
            this.onEnemyKilled(enemy);
          } else {
            this.ensureHpBar(enemy);
          }
        });

        this.physics.add.overlap(this.player, this.enemies, (player, enemy) => {
          this.damagePlayer();
        });

        this.physics.add.overlap(this.player, this.enemyBullets, (player, bullet) => {
          bullet.destroy();
          this.damagePlayer();
        });

        this.physics.add.overlap(this.player, this.pickups, (player, pickup) => {
          const kind = pickup.getData('kind');
          if (kind === 'health') {
            this.health = Math.min(CFG.HEALTH_MAX, this.health + CFG.HEAL_AMOUNT);
            this.updateHealthBar();
          } else if (kind === 'powerup') {
            this.currentFireRate = CFG.BOOSTED_FIRE_RATE_MS;
            this.powerupUntil = this.time.now + CFG.POWERUP_DURATION_MS;
            this.powerupIndicator.setVisible(true);
          }
          pickup.destroy();
        });
      }

      damagePlayer() {
        if (this.time.now < this.invulnUntil || this.gameOver) return;
        this.health -= CFG.ENEMY_DAMAGE;
        this.invulnUntil = this.time.now + CFG.INVULN_MS;
        this.updateHealthBar();
        if (this.health <= 0) this.enterGameOver();
      }

      setupInput() {
        this.cursors = this.input.keyboard.createCursorKeys();
        this.keys = this.input.keyboard.addKeys({
          A: Phaser.Input.Keyboard.KeyCodes.A,
          D: Phaser.Input.Keyboard.KeyCodes.D,
          W: Phaser.Input.Keyboard.KeyCodes.W,
          CTRL: Phaser.Input.Keyboard.KeyCodes.CTRL,
          ENTER: Phaser.Input.Keyboard.KeyCodes.ENTER
        });
        this.shootKeys = this.input.keyboard.addKeys('Z,X,C,V,B,N,M');
      }

      setupCamera(vh) {
        this.cameras.main.setBounds(0, 0, CFG.WORLD_W, vh);
        this.cameras.main.startFollow(this.player, true, 1, 1);
      }

      boxMuller(mu, sigma) {
        const u1 = Math.max(Math.random(), 1e-9);
        const u2 = Math.random();
        const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
        return mu + sigma * z;
      }

      scheduleNextEnemy() {
        if (this.gameOver) return;
        const raw = this.boxMuller(CFG.ENEMY_SPAWN_MU, CFG.ENEMY_SPAWN_SIGMA);
        const delay = Phaser.Math.Clamp(raw, CFG.ENEMY_SPAWN_MIN, CFG.ENEMY_SPAWN_MAX);
        this.nextEnemyEvent = this.time.delayedCall(delay, () => {
          this.spawnEnemy();
          this.scheduleNextEnemy();
        });
      }

      pickSpawnSurface() {
        const cam = this.cameras.main;
        const camRight = cam.scrollX + cam.width;
        const r = CFG.ENEMY_RADIUS;
        const candidates = [];
        for (const s of this.surfaces) {
          if (s.isGround) {
            const sx = Math.min(camRight + 40, CFG.WORLD_W - r - 2);
            if (sx > r + 2) {
              candidates.push({ surface: s, spawnLeft: sx, spawnRight: sx });
            }
          } else if (s.left > camRight && s.left < camRight + cam.width) {
            candidates.push({ surface: s, spawnLeft: s.left + r, spawnRight: s.right - r });
          }
        }
        if (candidates.length === 0) return null;
        return Phaser.Utils.Array.GetRandom(candidates);
      }

      pickKind(surface) {
        const weights = surface.isGround ? CFG.KIND_WEIGHTS_GROUND : CFG.KIND_WEIGHTS_PLATFORM;
        const r = Math.random();
        let acc = 0;
        for (const k of Object.keys(weights)) {
          acc += weights[k];
          if (r < acc) return k;
        }
        return Object.keys(weights)[0];
      }

      spawnEnemy() {
        if (this.gameOver) return;
        const pick = this.pickSpawnSurface();
        if (!pick) return;
        const surface = pick.surface;
        const kind = this.pickKind(surface);
        const r = CFG.ENEMY_RADIUS;
        const x = pick.spawnLeft === pick.spawnRight
          ? pick.spawnLeft
          : Phaser.Math.Between(pick.spawnLeft, pick.spawnRight);
        // runner = data-goblin, patroller = algo-drone, shooter = transumanoid
        const tex = kind === 'runner' ? 'enemy_goblin' : kind === 'patroller' ? 'enemy_drone' : 'enemy_transumanoid';
        const displayH = r * 7;
        const y = surface.top - displayH / 2;
        const e = this.enemies.create(x, y, tex);
        e.setScale(displayH / e.height);
        // Physics body: circle of display-radius r*2, hugging the bottom of the sprite so feet sit on the surface.
        const bodyDiameterTex = (r * 4) / e.scaleX;
        const offsetXTex = e.width / 2 - bodyDiameterTex / 2;
        const offsetYTex = e.height - bodyDiameterTex;
        e.body.setCircle(bodyDiameterTex / 2, offsetXTex, offsetYTex);
        e.setCollideWorldBounds(false);
        const hp = CFG.HP[kind];
        e.setData('kind', kind);
        e.setData('hp', hp);
        e.setData('hpMax', hp);
        e.setData('surface', surface);
        if (kind === 'shooter') {
          e.setImmovable(true);
          e.setData('nextFireAt', this.time.now + CFG.SHOOTER_FIRE_MS);
          e.setData('facing', this.player.x > x ? 1 : -1);
        } else if (kind === 'patroller') {
          e.setData('facing', Math.random() < 0.5 ? -1 : 1);
        }
      }

      ensureHpBar(enemy) {
        if (enemy.hpBar) return;
        enemy.hpBar = this.add.graphics().setDepth(500);
      }

      onEnemyKilled(enemy) {
        const kind = enemy.getData('kind');
        const x = enemy.x;
        const y = enemy.y;
        if (enemy.hpBar) { enemy.hpBar.destroy(); enemy.hpBar = null; }
        enemy.destroy();
        this.score += CFG.SCORE_PER_KILL;
        this.scoreText.setText('Score: ' + this.score);
        if (Math.random() < CFG.DROP_RATE[kind]) {
          const isHealth = Math.random() < CFG.HEALTH_SHARE[kind];
          this.spawnPickup(x, y, isHealth ? 'health' : 'powerup');
        }
      }

      spawnPickup(x, y, kind) {
        const tex = kind === 'health' ? 'tex_health' : 'tex_powerup';
        const p = this.pickups.create(x, y, tex);
        p.body.setCircle(12);
        p.body.setAllowGravity(false);
        p.setData('kind', kind);
        p.setData('expiresAt', this.time.now + CFG.PICKUP_LIFETIME_MS);
      }

      fireBullet() {
        const now = this.time.now;
        if (now - this.lastFireAt < this.currentFireRate) return;
        this.lastFireAt = now;
        const b = this.bullets.create(this.player.x + this.facing * 22, this.player.y, 'tex_bullet');
        b.body.setAllowGravity(false);
        b.body.setCircle(5);
        b.setVelocityX(this.facing * CFG.BULLET_SPEED);
      }

      fireShooterBullet(shooter) {
        const facing = shooter.getData('facing');
        const b = this.enemyBullets.create(shooter.x + facing * 22, shooter.y, 'tex_enemy_bullet');
        b.body.setAllowGravity(false);
        b.body.setCircle(5);
        b.setVelocityX(facing * CFG.SHOOTER_BULLET_SPEED);
      }

      handlePlayerInput() {
        const left = this.cursors.left.isDown || this.keys.A.isDown || touchInput.left;
        const right = this.cursors.right.isDown || this.keys.D.isDown || touchInput.right;
        const touchJump = touchInput.jumpPressed;
        if (touchJump) touchInput.jumpPressed = false;
        const jumpPressed =
          Phaser.Input.Keyboard.JustDown(this.cursors.space) ||
          Phaser.Input.Keyboard.JustDown(this.cursors.up) ||
          Phaser.Input.Keyboard.JustDown(this.keys.W) ||
          touchJump;
        const shoot = this.keys.CTRL.isDown || touchInput.shoot || Object.values(this.shootKeys).some(k => k.isDown);

        if (left) {
          this.player.setVelocityX(-CFG.PLAYER_SPEED);
          if (this.facing !== -1) { this.facing = -1; this.player.setFlipX(true); }
        } else if (right) {
          this.player.setVelocityX(CFG.PLAYER_SPEED);
          if (this.facing !== 1) { this.facing = 1; this.player.setFlipX(false); }
        } else {
          this.player.setVelocityX(0);
        }

        if (jumpPressed && this.player.body.blocked.down) {
          this.player.setVelocityY(CFG.JUMP_V);
        }

        if (shoot) this.fireBullet();
      }

      updateEnemies() {
        const r = CFG.ENEMY_RADIUS;
        const now = this.time.now;
        this.enemies.getChildren().forEach((e) => {
          if (!e.active) return;
          const kind = e.getData('kind');
          if (kind === 'runner') {
            const dir = e.x > this.player.x ? -1 : 1;
            e.setVelocityX(dir * CFG.ENEMY_SPEED);
          } else if (kind === 'patroller') {
            const surface = e.getData('surface');
            let facing = e.getData('facing');
            if (facing < 0 && e.x <= surface.left + r) { facing = 1; e.setData('facing', 1); }
            else if (facing > 0 && e.x >= surface.right - r) { facing = -1; e.setData('facing', -1); }
            e.setVelocityX(facing * CFG.PATROLLER_SPEED);
          } else if (kind === 'shooter') {
            e.setVelocityX(0);
            const facing = this.player.x > e.x ? 1 : -1;
            e.setData('facing', facing);
            if (now >= e.getData('nextFireAt')) {
              this.fireShooterBullet(e);
              e.setData('nextFireAt', now + CFG.SHOOTER_FIRE_MS);
            }
          }
        });
      }

      updateHpBars() {
        const r = CFG.ENEMY_RADIUS;
        this.enemies.getChildren().forEach((e) => {
          if (!e.active || !e.hpBar) return;
          const hp = e.getData('hp');
          const hpMax = e.getData('hpMax');
          const frac = Math.max(0, hp / hpMax);
          const w = 24, h = 3;
          const x = e.x - w / 2;
          const y = e.y - e.displayHeight / 2 - 6;
          e.hpBar.clear();
          e.hpBar.fillStyle(0x222018, 1);
          e.hpBar.fillRect(x, y, w, h);
          e.hpBar.fillStyle(0xc94c4c, 1);
          e.hpBar.fillRect(x, y, w * frac, h);
        });
      }

      cullBullets() {
        this.bullets.getChildren().forEach((b) => {
          if (b.active && (b.x < 0 || b.x > CFG.WORLD_W)) b.destroy();
        });
        this.enemyBullets.getChildren().forEach((b) => {
          if (b.active && (b.x < 0 || b.x > CFG.WORLD_W)) b.destroy();
        });
      }

      updatePickups() {
        const now = this.time.now;
        this.pickups.getChildren().forEach((p) => {
          if (!p.active) return;
          const expiresAt = p.getData('expiresAt');
          if (now >= expiresAt) {
            p.destroy();
            return;
          }
          if (now >= expiresAt - CFG.PICKUP_BLINK_MS) {
            p.setVisible(Math.floor(now / 100) % 2 === 0);
          } else {
            p.setVisible(true);
          }
        });
      }

      updatePowerup() {
        if (this.powerupUntil && this.time.now >= this.powerupUntil) {
          this.currentFireRate = CFG.FIRE_RATE_MS;
          this.powerupUntil = 0;
          this.powerupIndicator.setVisible(false);
        }
      }

      buildHud() {
        this.hud = this.add.container(0, 0).setScrollFactor(0).setDepth(1000);

        this.healthBarBg = this.add.graphics().setScrollFactor(0);
        this.healthBar = this.add.graphics().setScrollFactor(0);
        this.hud.add([this.healthBarBg, this.healthBar]);
        this.updateHealthBar();

        this.scoreText = this.add.text(20, 50, 'Score: 0', {
          fontFamily: 'Georgia, "Times New Roman", serif',
          fontSize: '22px',
          color: '#fdf8f1'
        }).setScrollFactor(0);
        this.hud.add(this.scoreText);

        this.powerupIndicator = this.add.circle(220, 30, 10, CFG.COLORS.powerup)
          .setScrollFactor(0)
          .setVisible(false);
        this.hud.add(this.powerupIndicator);

        const vw = this.scale.width;
        const vh = this.scale.height;
        this.gameOverOverlay = this.add.container(vw / 2, vh / 2).setScrollFactor(0).setDepth(2000);
        const dim = this.add.rectangle(0, 0, vw * 2, vh * 2, 0x000000, 0.6);
        const title = this.add.text(0, -60, 'Game Over', {
          fontFamily: 'Georgia, "Times New Roman", serif',
          fontSize: '56px',
          color: '#b8893a'
        }).setOrigin(0.5);
        this.gameOverScoreText = this.add.text(0, 10, 'Score: 0', {
          fontFamily: 'Georgia, "Times New Roman", serif',
          fontSize: '28px',
          color: '#fdf8f1'
        }).setOrigin(0.5);
        const hint = this.add.text(0, 70, 'Press Enter to restart', {
          fontFamily: 'Georgia, "Times New Roman", serif',
          fontSize: '22px',
          color: '#cfc4b0'
        }).setOrigin(0.5);
        this.gameOverOverlay.add([dim, title, this.gameOverScoreText, hint]);
        this.gameOverOverlay.setVisible(false);
      }

      updateHealthBar() {
        const x = 20, y = 20, w = 180, h = 18;
        this.healthBarBg.clear();
        this.healthBarBg.fillStyle(0x222018, 1);
        this.healthBarBg.fillRect(x, y, w, h);
        this.healthBarBg.lineStyle(2, 0xfdf8f1, 0.8);
        this.healthBarBg.strokeRect(x, y, w, h);

        const frac = Math.max(0, this.health) / CFG.HEALTH_MAX;
        this.healthBar.clear();
        this.healthBar.fillStyle(0xc94c4c, 1);
        this.healthBar.fillRect(x + 2, y + 2, (w - 4) * frac, h - 4);
      }

      enterGameOver() {
        this.gameOver = true;
        if (this.nextEnemyEvent) { this.nextEnemyEvent.remove(false); this.nextEnemyEvent = null; }
        this.physics.pause();
        this.gameOverScoreText.setText('Score: ' + this.score);
        this.gameOverOverlay.setVisible(true);
      }

      update() {
        if (this.gameOver) {
          const enterTouch = touchInput.enterPressed;
          if (enterTouch) touchInput.enterPressed = false;
          if (Phaser.Input.Keyboard.JustDown(this.keys.ENTER) || enterTouch) {
            this.scene.restart();
          }
          return;
        }
        // Always drain the one-shot so it can't trigger across frames.
        touchInput.enterPressed = false;
        this.handlePlayerInput();
        this.updateEnemies();
        this.updateHpBars();
        this.cullBullets();
        this.updatePickups();
        this.updatePowerup();
      }
    }

    new Phaser.Game({
      type: Phaser.AUTO,
      parent: 'game',
      backgroundColor: '#1a1410',
      pixelArt: true,
      physics: {
        default: 'arcade',
        arcade: { gravity: { y: CFG.GRAVITY }, debug: false }
      },
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: CFG.BASE_W,
        height: CFG.BASE_H
      },
      scene: [MainScene]
    });
  </script>
</body>
</html>
